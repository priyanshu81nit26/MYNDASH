<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" fill="none">
  <!-- ============================================================
       MYNDASH — "Neural Infinity"
       One continuous neural pathway forming an infinity loop:
       the left lobe solid (logic), the right lobe pulse-dashed
       (creativity firing). A synapse node sits at the crossover,
       three dendrites spark upward — a mind in flow, endless.
       Gradient: electric cyan → violet → magenta on pure black.
       ============================================================ -->
  <defs>
    <linearGradient id="flow" x1="40" y1="100" x2="280" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00E5FF"/>
      <stop offset="0.5" stop-color="#7C4DFF"/>
      <stop offset="1" stop-color="#FF2E92"/>
    </linearGradient>
    <radialGradient id="node" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.45" stop-color="#B9F4FF"/>
      <stop offset="1" stop-color="#00E5FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="320" height="200" fill="#050507"/>

  <!-- left lobe: solid, calm, analytical -->
  <path d="M160 100
           C 138 62, 78 58, 62 92
           C 48 122, 74 148, 104 142
           C 132 136, 148 118, 160 100 Z"
        stroke="url(#flow)" stroke-width="11" stroke-linecap="round"
        fill="none" filter="url(#glow)"/>

  <!-- right lobe: firing — dashed neural pulses -->
  <path d="M160 100
           C 182 138, 242 142, 258 108
           C 272 78, 246 52, 216 58
           C 188 64, 172 82, 160 100 Z"
        stroke="url(#flow)" stroke-width="11" stroke-linecap="round"
        stroke-dasharray="22 13" fill="none" filter="url(#glow)"/>

  <!-- synapse node at the crossover -->
  <circle cx="160" cy="100" r="22" fill="url(#node)"/>
  <circle cx="160" cy="100" r="9" fill="#FFFFFF"/>

  <!-- three dendrite sparks -->
  <line x1="160" y1="74" x2="160" y2="56" stroke="#B9F4FF" stroke-width="4" stroke-linecap="round"/>
  <line x1="142" y1="82" x2="130" y2="68" stroke="#7C4DFF" stroke-width="4" stroke-linecap="round"/>
  <line x1="178" y1="82" x2="190" y2="68" stroke="#FF2E92" stroke-width="4" stroke-linecap="round"/>

  <!-- wordmark -->
  <text x="160" y="182" text-anchor="middle"
        font-family="Space Grotesk, Inter, sans-serif" font-size="30"
        font-weight="800" letter-spacing="14" fill="#F2F3F8">MYNDASH</text>
</svg>
