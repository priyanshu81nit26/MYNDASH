name: reflex_duel
description: "Reflex Duel Arena — 1v1 online battle of reaction, focus and mind games."
publish_to: "none"
version: 1.0.1+2

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  firebase_database: ^11.1.4
  cloud_functions: ^5.1.3
  google_fonts: ^6.2.1
  shared_preferences: ^2.3.2
  google_sign_in: ^6.2.1
  image_picker: ^1.1.2
  image: ^4.9.1
  crypto: ^3.0.5
  share_plus: ^10.1.2
  path_provider: ^2.1.4
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/games/
    - assets/mynd_cards/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "app_icon_fg.png"
  web:
    generate: true
    image_path: "app_icon.png"
    background_color: "#FFFFFF"
    theme_color: "#FFFFFF"
